<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="Helvetica, Arial, sans-serif">
  <rect width="1100" height="720" fill="#0f1115"/>
  <text x="40" y="46" fill="#e8ebf0" font-size="26" font-weight="bold">AtomQuest Video Support Platform — Architecture</text>
  <text x="40" y="72" fill="#9aa3b2" font-size="14">Server-routed media over WebSocket. No WebRTC peer-to-peer. No third-party video API.</text>

  <!-- Agent browser -->
  <rect x="40" y="120" width="300" height="230" rx="12" fill="#171a21" stroke="#2a313c"/>
  <text x="60" y="150" fill="#4f8cff" font-size="16" font-weight="bold">Agent Browser</text>
  <rect x="60" y="166" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="74" y="191" fill="#e8ebf0" font-size="13">getUserMedia (camera + mic)</text>
  <rect x="60" y="214" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="74" y="239" fill="#e8ebf0" font-size="13">MediaRecorder → WebM (VP8/Opus)</text>
  <rect x="60" y="262" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="74" y="287" fill="#e8ebf0" font-size="13">MediaSource Extensions (playback)</text>
  <rect x="60" y="310" width="260" height="28" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="74" y="329" fill="#9aa3b2" font-size="12">Role: create / end / record</text>

  <!-- Customer browser -->
  <rect x="760" y="120" width="300" height="230" rx="12" fill="#171a21" stroke="#2a313c"/>
  <text x="780" y="150" fill="#ffb340" font-size="16" font-weight="bold">Customer Browser</text>
  <rect x="780" y="166" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="794" y="191" fill="#e8ebf0" font-size="13">getUserMedia (camera + mic)</text>
  <rect x="780" y="214" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="794" y="239" fill="#e8ebf0" font-size="13">MediaRecorder → WebM (VP8/Opus)</text>
  <rect x="780" y="262" width="260" height="40" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="794" y="287" fill="#e8ebf0" font-size="13">MediaSource Extensions (playback)</text>
  <rect x="780" y="310" width="260" height="28" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="794" y="329" fill="#9aa3b2" font-size="12">Role: join via invite only</text>

  <!-- Server -->
  <rect x="370" y="150" width="360" height="300" rx="12" fill="#13233f" stroke="#4f8cff"/>
  <text x="390" y="180" fill="#4f8cff" font-size="18" font-weight="bold">Node.js Application Server</text>
  <text x="390" y="200" fill="#9aa3b2" font-size="12">(Express + ws) — single owned process</text>

  <rect x="390" y="214" width="320" height="36" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="404" y="237" fill="#e8ebf0" font-size="13">REST API: /login, /sessions, /recording</text>
  <rect x="390" y="256" width="320" height="36" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="404" y="279" fill="#e8ebf0" font-size="13">WebSocket signaling + presence</text>
  <rect x="390" y="298" width="320" height="36" rx="8" fill="#2a3a1f" stroke="#34c759"/>
  <text x="404" y="321" fill="#e8ebf0" font-size="13">Media Relay (SFU-style fan-out)</text>
  <rect x="390" y="340" width="320" height="36" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="404" y="363" fill="#e8ebf0" font-size="13">Chat broadcast + persistence</text>
  <rect x="390" y="382" width="320" height="36" rx="8" fill="#1f242d" stroke="#2a313c"/>
  <text x="404" y="405" fill="#e8ebf0" font-size="13">Access control: agent token / invite</text>

  <!-- Storage -->
  <rect x="420" y="500" width="260" height="120" rx="12" fill="#171a21" stroke="#2a313c"/>
  <text x="440" y="528" fill="#e8ebf0" font-size="15" font-weight="bold">Persistence</text>
  <text x="440" y="552" fill="#9aa3b2" font-size="13">data/db.json — sessions, participant</text>
  <text x="440" y="570" fill="#9aa3b2" font-size="13">timeline, chat history (queryable)</text>
  <text x="440" y="594" fill="#9aa3b2" font-size="13">data/recordings/*.webm</text>

  <!-- Arrows agent <-> server -->
  <line x1="340" y1="235" x2="390" y2="232" stroke="#34c759" stroke-width="3" marker-end="url(#a)"/>
  <line x1="390" y1="316" x2="340" y2="290" stroke="#34c759" stroke-width="3" marker-end="url(#a)"/>
  <text x="345" y="210" fill="#34c759" font-size="11">media chunks ↑</text>
  <text x="345" y="305" fill="#34c759" font-size="11">peer media ↓</text>

  <!-- Arrows server <-> customer -->
  <line x1="710" y1="232" x2="760" y2="235" stroke="#34c759" stroke-width="3" marker-end="url(#a)"/>
  <line x1="760" y1="290" x2="710" y2="316" stroke="#34c759" stroke-width="3" marker-end="url(#a)"/>
  <text x="715" y="210" fill="#34c759" font-size="11">↑ media chunks</text>
  <text x="715" y="305" fill="#34c759" font-size="11">↓ peer media</text>

  <!-- server to storage -->
  <line x1="550" y1="450" x2="550" y2="500" stroke="#9aa3b2" stroke-width="2" marker-end="url(#g)"/>

  <text x="40" y="670" fill="#9aa3b2" font-size="13">Media path: Browser → getUserMedia → MediaRecorder (WebM) → WebSocket → Server fan-out → peer WebSocket → MediaSource Extensions.</text>
  <text x="40" y="692" fill="#9aa3b2" font-size="13">Every media byte transits the application server. No RTCPeerConnection, no STUN/TURN to a third party, no hosted video SDK.</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#34c759"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9aa3b2"/></marker>
  </defs>
</svg>
